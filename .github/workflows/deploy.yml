name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Agentic_CMS_Site/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Agentic_CMS_Site
      - name: Build
        run: npm run build
        working-directory: Agentic_CMS_Site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Agentic_CMS_Site/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
